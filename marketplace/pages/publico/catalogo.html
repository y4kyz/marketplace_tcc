<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Marketplace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <h1>Marketplace</h1>
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Buscar produtos...">
                <button class="btn-primary">Buscar</button>
            </div>

            <nav class="nav-actions">
                <a href="login.html">Entrar</a>
                <a href="../cliente/carrinho.html">Carrinho</a>
            </nav>
        </div>
    </header>

    <!-- CATEGORIAS -->
    <nav class="categories">
        <div class="container">
            <ul>
                <li><a href="#">Eletrônicos</a></li>
                <li><a href="#">Moda</a></li>
                <li><a href="#">Casa</a></li>
                <li><a href="#">Esportes</a></li>
                <li><a href="#">Livros</a></li>
            </ul>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="container" style="padding: 40px 0;">

        <h2 style="margin-bottom: 30px;">Catálogo de Produtos</h2>

        <div class="layout">

            <!-- SIDEBAR FILTROS -->
            <aside class="sidebar">
                <h3>Filtros</h3>

                <div class="filter-group">
                    <label>Categoria</label>
                    <select>
                        <option>Todas</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Preço mínimo</label>
                    <input type="number" placeholder="R$ 0,00">
                </div>

                <div class="filter-group">
                    <label>Preço máximo</label>
                    <input type="number" placeholder="R$ 0,00">
                </div>

                <div class="filter-group">
                    <label>Ordenar por</label>
                    <select>
                        <option>Mais recentes</option>
                        <option>Menor preço</option>
                        <option>Maior preço</option>
                    </select>
                </div>

                <button class="btn-primary" style="width: 100%;">Aplicar Filtros</button>
            </aside>

            <!-- GRID DE PRODUTOS -->
            <section>

                <div class="product-grid" id="product-list">

                    <!--
                        Produtos serão inseridos aqui via:
                        - JavaScript (fase estática)
                        ou
                        - Template engine (EJS/Handlebars) no Node.js
                    -->

                </div>

                <!-- ESTADO VAZIO -->
                <div id="empty-state" class="card" style="margin-top: 20px;">
                    <p>Nenhum produto encontrado.</p>
                </div>

            </section>

        </div>

    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div>
                <h3>Marketplace</h3>
                <p>Projeto acadêmico - TCC</p>
            </div>
        </div>

        <div class="footer-bottom">
            <p>&copy; 2026</p>
        </div>
    </footer>

</body>
</html>
